name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run ruff
        run: pip install ruff~=0.11.13 -q && ruff check src/ && ruff format --check src/

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/*.txt

      - name: Install dependencies
        run: pip install -r requirements/dev.txt

      - name: Run pytest
        run: pytest tests/api/ -v --tb=short
        env:
          DATABASE_URL: "postgresql+psycopg2://user:pass@localhost/test_db"
          MLFLOW_TRACKING_URI: "http://localhost:5000"

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/*.txt

      - name: Install dependencies
        run: pip install -r requirements/dev.txt

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short
        env:
          TEST_DATABASE_URL: "postgresql+psycopg2://testuser:testpass@localhost/test_db"
          DATABASE_URL: "postgresql+psycopg2://testuser:testpass@localhost/test_db"
          MLFLOW_TRACKING_URI: "http://localhost:5000"
