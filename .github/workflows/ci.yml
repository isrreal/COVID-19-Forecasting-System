name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run ruff
        run: pip install ruff~=0.11.13 -q && ruff check src/ && ruff format --check src/
      - name: Run mypy
        run: pip install mypy~=1.16.0 sqlalchemy~=2.0.35 types-requests -q && mypy src/

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/*.txt

      - name: Install dependencies
        run: pip install -r requirements/dev.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: "postgresql+psycopg2://user:pass@localhost/test_db"
          MLFLOW_TRACKING_URI: "http://localhost:5000"
