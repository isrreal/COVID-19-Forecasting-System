services:

  db:
    image: postgres:15-alpine
    container_name: dengue_db_container
    env_file:
      - .env
    environment:
      POSTGRES_DB: dengue_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    ports:
      - "5430:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d dengue_db"]
      interval: 10s
      timeout: 5s
      retries: 5


  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow/Dockerfile
    container_name: mlflow_tracking_server
    env_file:
      - .env
    ports:
      - "5001:5000"
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/mlflow_db
      --default-artifact-root file:///mlflow/artifacts
      --serve-artifacts
      --host 0.0.0.0
      --port 5000
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
      - mlflow_backend:/mlflow/backend
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s


  api:
    build:
      context: .
      dockerfile: docker/fastapi/Dockerfile
    container_name: fastapi_api_server
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
      - mlflow_artifacts:/mlflow/artifacts:ro
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      DATABASE_URL: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/dengue_db"
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      db:
        condition: service_healthy
      mlflow:
        condition: service_healthy


  test:
    build:
      context: .
      dockerfile: docker/fastapi/Dockerfile
      target: test
    environment:
      PYTHONPATH: /app
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DATABASE_URL: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/dengue_db"
    profiles:
      - test


  training:
    build:
      context: .
      dockerfile: docker/training/Dockerfile
    container_name: dengue_training_runner
    volumes:
      - .:/app
      - mlflow_artifacts:/mlflow/artifacts
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      DATABASE_URL: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/dengue_db"
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      db:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]


  notebook:
    container_name: dengue_notebook
    build:
      context: .
      dockerfile: docker/notebook/Dockerfile
    ports:
      - "8888:8888"
    volumes:
      - .:/app
      - mlflow_artifacts:/mlflow/artifacts
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      PYTHONPATH: /app
    depends_on:
      - mlflow
    command: >
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --ServerApp.token=''


  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard/Dockerfile
    container_name: dengue_dashboard
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      - api

volumes:
  postgres_data:
  mlflow_artifacts:
  mlflow_backend: